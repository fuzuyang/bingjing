<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传文档路由测试</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #d8dce6;
      --text: #121722;
      --muted: #5c667a;
      --primary: #1f6fff;
      --primary-hover: #1859cb;
      --ok: #0b8f53;
      --bad: #c63030;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 10%, #e8f1ff 0%, transparent 28%),
        radial-gradient(circle at 90% 0%, #e9ffe9 0%, transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(18, 23, 34, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    button {
      cursor: pointer;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 22px;
    }

    .status.ok { color: var(--ok); }
    .status.bad { color: var(--bad); }

    pre {
      margin: 14px 0 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0d1320;
      color: #dbe7ff;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      overflow: auto;
      max-height: 55vh;
    }

    .section-title {
      margin: 18px 0 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .generated-wrap { display: none; }

    .generated-wrap pre {
      background: #0f172a;
      color: #e2e8f0;
      max-height: 45vh;
    }

    @media (max-width: 760px) {
      .row { grid-template-columns: 1fr; }
      body { padding: 12px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>/upload/document 路由测试页</h1>
      <p class="desc">仅用于本地调试：上传 PDF，选择 file_type 和 expected_template，查看后端 JSON 响应。</p>

      <form id="upload-form">
        <div>
          <label for="file">PDF 文件</label>
          <input id="file" name="file" type="file" accept=".pdf,application/pdf" required />
        </div>

        <div class="row">
          <div>
            <label for="file_type">file_type</label>
            <select id="file_type" name="file_type" required>
              <option value="1">1 - 律师意见书</option>
              <option value="2">2 - 起诉状</option>
            </select>
          </div>
          <div>
            <label for="expected_template">expected_template</label>
            <select id="expected_template" name="expected_template" required>
              <option value="1">1 - 案件报告</option>
              <option value="2">2 - 案件诉讼方案请示</option>
              <option value="3">3 - 聘请外部律师请示</option>
            </select>
          </div>
        </div>

        <button id="submit-btn" type="submit">发送请求</button>
      </form>

      <div id="status" class="status"></div>
      <div id="generated-wrap" class="generated-wrap">
        <div class="section-title">generated_answer</div>
        <pre id="generated-answer">等待请求...</pre>
      </div>
      <div class="section-title">完整响应 JSON</div>
      <pre id="output">等待请求...</pre>
    </div>
  </div>

  <script>
    const form = document.getElementById("upload-form");
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const generatedWrap = document.getElementById("generated-wrap");
    const generatedAnswerEl = document.getElementById("generated-answer");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.className = "status";
      statusEl.textContent = "请求中...";
      output.textContent = "";
      generatedWrap.style.display = "none";
      generatedAnswerEl.textContent = "";
      submitBtn.disabled = true;

      try {
        const fd = new FormData(form);
        const response = await fetch("/upload/document", {
          method: "POST",
          body: fd
        });
        const data = await response.json().catch(() => ({}));
        const generatedAnswer =
          (data &&
            data.data &&
            typeof data.data.generated_answer === "string" &&
            data.data.generated_answer) ||
          (data && typeof data.generated_answer === "string" && data.generated_answer) ||
          "";

        output.textContent = JSON.stringify(
          {
            http_status: response.status,
            response: data
          },
          null,
          2
        );

        if (response.ok && data && data.status !== false) {
          statusEl.className = "status ok";
          statusEl.textContent = "请求成功";
          generatedWrap.style.display = "block";
          generatedAnswerEl.textContent = generatedAnswer || "未返回 generated_answer";
        } else {
          statusEl.className = "status bad";
          statusEl.textContent = "请求失败（见下方响应）";
          if (generatedAnswer) {
            generatedWrap.style.display = "block";
            generatedAnswerEl.textContent = generatedAnswer;
          } else {
            generatedWrap.style.display = "none";
            generatedAnswerEl.textContent = "";
          }
        }
      } catch (error) {
        statusEl.className = "status bad";
        statusEl.textContent = "请求异常";
        generatedWrap.style.display = "none";
        generatedAnswerEl.textContent = "";
        output.textContent = JSON.stringify(
          { error: String(error) },
          null,
          2
        );
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
